<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  background:#121212;
  color:#e0e0e0;
  font-family:"Roboto", sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.container { max-width:900px; width:100%; }

header {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.card {
  background:#1e1e1e;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.links a {
  display:block;
  background:#2c2c2c;
  padding:12px;
  border-radius:8px;
  text-align:center;
  color:#bb86fc;
  text-decoration:none;
}

.links a:hover { background:#333; }

/* Apps */
.app {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  background:#2a2a2a;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

.app:hover { background:#3a3a3a; }

.app img {
  width:48px;
  height:48px;
}

.app-name {
  font-weight:500;
}
</style>
</head>

<body>
<div class="container">

<header>
<h1>Dashboard</h1>
</header>

<!-- Quick Links -->
<div class="card links">
<h2 style="margin-bottom:12px;">Quick Links</h2>
<div class="grid">
<a href="/filemanager.html">📁 File Manager</a>
<a href="/logs.html">>_ Terminal</a>
<a href="/clearlogs" id="clearLogs">🧹 Clear Logs</a>
<a href="/restart" id="restartDevice">🔄 Restart</a>
</div>
</div>

<!-- Apps -->
<div class="card">
<h2 style="margin-bottom:12px;">Apps</h2>
<div id="appsGrid" class="grid"></div>
</div>

</div>

<script>

// ---------- QUICK ACTIONS ----------
["clearLogs","restartDevice"].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener("click",e=>{
    e.preventDefault();
    fetch(el.href)
      .then(()=>alert(`✅ ${el.textContent.trim()} triggered`))
      .catch(()=>alert(`❌ Failed: ${el.textContent.trim()}`));
  });
});

// ---------- APP SYSTEM ----------
let appsList = [];

function renderApps(apps) {
  const grid = document.getElementById("appsGrid");
  grid.innerHTML = "";

  apps.forEach(app => {
    const card = document.createElement("div");
    card.className = "app";

    const img = document.createElement("img");

if (app.icon.startsWith("http://") || app.icon.startsWith("https://")) {
  // 🌐 online icon
  img.src = app.icon;
} else {
  // 📁 local icon
  img.src = `/open?path=/apps/data/assets/${app.icon}`;
}

    const label = document.createElement("div");
    label.className = "app-name";
    label.textContent = app.name;

    card.onclick = () => launchApp(app.file);

    card.append(img, label);
    grid.appendChild(card);
  });
}

// ---------- LAUNCH ----------
function launchApp(file) {
  if (file.endsWith(".wx")) {
    runWxScript(file);
  } else {
    fetch(`/runscript?script=${encodeURIComponent("/apps/" + file)}`);
  }
}

// ---------- WX ENGINE ----------
window.addEventListener("pageshow", () => {
  runningWx = false;
});

async function runWxScript(file) {
  if (runningWx) return;
  runningWx = true;

  try {
    const resp = await fetch(`/open?path=/apps/${file}`);
    if (!resp.ok) throw new Error("Failed to load WX file");

    const text = await resp.text();
    const lines = text.split(/\r?\n/);

    for (let raw of lines) {
      let line = raw.trim();

      // skip comments / empty
      if (!line || line.startsWith("//")) continue;

      const m = line.match(/^([a-zA-Z_]\w*)\((.*)\)$/);
      if (!m) continue;

      let cmd = m[1];
      let arg = m[2].trim();

      // remove quotes safely
      if (
        (arg.startsWith('"') && arg.endsWith('"')) ||
        (arg.startsWith("'") && arg.endsWith("'"))
      ) {
        arg = arg.slice(1, -1);
      }

      switch (cmd) {

        // ✅ FIXED OPEN
        case "open": {
  let url = arg;

  // local file → go through /open
  if (url.startsWith("/")) {
    url = `/open?path=${encodeURIComponent(url)}`;
  }

  // 🔥 REAL NAVIGATION
  window.location.href = url;
  return;
}

        // run backend script
        case "script":
          await fetch(`/runscript?script=${encodeURIComponent(arg)}`);
          break;

        // redirect browser
        case "redirect":
          window.location.href = arg;
          return;

        // fallback → send to ESP32 command engine
        default:
          await fetch(`/runcommand?command=${encodeURIComponent(line)}`);
      }
    }

  } catch (e) {
    console.error("WX ERROR:", e);
    alert("Failed to launch app");
  }

  runningWx = false;
}

// ---------- LOAD APPS ----------
function fetchApps() {
  fetch("/listapps")
    .then(r => r.json())
    .then(apps => {
      appsList = apps;
      renderApps(appsList);
    })
    .catch(console.error);
}

document.addEventListener("DOMContentLoaded", fetchApps);

</script>

</body>
</html>
